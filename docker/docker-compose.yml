services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: warehouse
    ports:
      - "3306:3306"
    volumes:
      - ${DATA_ROOT}/mysql:/var/lib/mysql
      - ../sql/warehouse.sql:/docker-entrypoint-initdb.d/warehouse.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: warehouse-backend
    expose:
      - "8899"
    volumes:
      - ${DATA_ROOT}/warehouse/back:/app/config
    environment:
      # 加载外部挂载目录的配置文件，优先级高于 JAR 内配置
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config/
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    container_name: warehouse-web
    ports:
      - "8888:80"
    volumes:
      # 挂载到中间目录，entrypoint 脚本从中复制到 /etc/nginx/
      # 避免 Windows Docker 文件挂载创建目录的问题
      - ${DATA_ROOT}/warehouse-nginx:/app/nginx-config
    depends_on:
      - backend
