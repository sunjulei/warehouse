services:
  mysql:
    image: mysql:8.0
    container_name: warehouse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: warehouse
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/warehouse.sql:/docker-entrypoint-initdb.d/warehouse.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./warehouse-back
    container_name: warehouse-backend
    ports:
      - "8888:8888"
    environment:
      SPRING_DATASOURCE_DRUID_URL: jdbc:mysql://mysql:3306/warehouse?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_DRUID_USERNAME: root
      SPRING_DATASOURCE_DRUID_PASSWORD: "123456"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./warehouse-front
    container_name: warehouse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
