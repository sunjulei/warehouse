
# 开发环境配置
spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      max-active: 20
      max-wait: 5000
      initial-size: 1
      filters: stat,log4j,wall
      validation-query: SELECT 'X'
      enable: true
      # Druid 监控页面（默认关闭；确需开启时设置 DRUID_CONSOLE_ENABLED=true 并务必通过 DRUID_PWD 设置强密码）
      stat-view-servlet:
        enabled: ${DRUID_CONSOLE_ENABLED:false}
        login-username: ${DRUID_USER:admin}
        login-password: ${DRUID_PWD:}
        url-pattern: /druid/*

# 开发环境打印 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 开发端口
server:
  port: 8899
