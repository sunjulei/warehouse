# 生产环境配置
spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/warehouse?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=true
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      max-active: 50
      max-wait: 5000
      initial-size: 5
      filters: stat,wall
      validation-query: SELECT 'X'
      enable: true
      # 生产环境关闭 Druid 监控页面
      stat-view-servlet:
        enabled: false

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 生产端口
server:
  port: 8899
