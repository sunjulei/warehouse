# 公共配置
server:
  servlet:
    context-path: /warehouse
spring:
  profiles:
    active: @spring.profiles.active@   # 由 Maven Profile 控制：dev / pro

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # thymeleaf的配置（已禁用，前后端分离）
  thymeleaf:
    enabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# 配置 mybatis-plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      id-type: auto

# SA-Token 配置
sa-token:
  token-name: satoken
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid
  is-log: false
  is-read-cookie: true
  is-read-header: true
  cookie:
    path: /
